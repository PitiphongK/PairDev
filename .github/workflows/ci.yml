# .github/workflows/ci.yml

name: PairDev CI/CD

on:
  push:

jobs:
  unit-tests:
    name: Unit & Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.24.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Unit & Backend Tests
        run: pnpm test:unit
        env:
          REDIS_URL: redis://localhost:6379

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.24.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps

      - name: Run E2E Tests
        run: |
          pnpm dev:server &
          pnpm dev:yjs &
          sleep 5
          pnpm test:e2e
        env:
          REDIS_URL: redis://localhost:6379
          GLOT_API_TOKEN: ${{ secrets.GLOT_API_TOKEN }}
          NEXT_PUBLIC_YJS_WEBSOCKET_URL: ws://localhost:1234
          NEXT_PUBLIC_SOCKET_URL: ws://localhost:4000

  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Vercel Deploy Hook
        run: curl -X POST ${{ secrets.VERCEL_MAIN_BRANCH_HOOK_DEPLOY }}

      - name: Trigger Render Socket Server Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_SOCKET_DEPLOY_HOOK_URL }}

      - name: Trigger Render Yjs Server Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_YJS_DEPLOY_HOOK_URL }}